<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBridge - Connexion</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ==================== LOGIN STYLES ==================== */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
        }

        .login-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .login-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: none;
            color: #888;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-tab.active {
            background: rgba(233,69,96,0.2);
            color: #fff;
        }

        .login-tab:hover:not(.active) {
            background: rgba(255,255,255,0.08);
            color: #ccc;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #eee;
            font-size: 1em;
            transition: border-color 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #e94560;
            box-shadow: 0 0 10px rgba(233,69,96,0.2);
        }

        .form-group input::placeholder {
            color: #555;
        }

        .error-msg {
            background: rgba(231,76,60,0.15);
            border: 1px solid rgba(231,76,60,0.3);
            color: #e74c3c;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9em;
            margin-bottom: 15px;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .success-msg {
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.3);
            color: #2ecc71;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9em;
            margin-bottom: 15px;
            display: none;
        }

        .success-msg.visible {
            display: block;
        }

        .login-form {
            display: block;
        }

        .login-form.hidden {
            display: none;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 0.85em;
        }

        .cards-deco {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            opacity: 0.3;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-container">
        <h1 class="title">♠ MyBridge ♥</h1>
        <p class="subtitle">Jeu de Bridge en ligne</p>
        <div class="cards-deco">♣ ♦ ♥ ♠</div>

        <!-- Tabs -->
        <div class="login-tabs">
            <button class="login-tab active" id="tab-login" onclick="showTab('login')">Connexion</button>
            <button class="login-tab" id="tab-register" onclick="showTab('register')">Inscription</button>
        </div>

        <!-- Error / Success messages -->
        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>

        <!-- Login Form -->
        <form class="login-form" id="form-login" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-username">Nom d'utilisateur</label>
                <input type="text" id="login-username" name="username" placeholder="Votre nom d'utilisateur" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="login-password">Mot de passe</label>
                <input type="password" id="login-password" name="password" placeholder="Votre mot de passe" required autocomplete="current-password">
            </div>
            <button type="submit" class="primary-btn" id="login-btn">Se connecter</button>
        </form>

        <!-- Register Form -->
        <form class="login-form hidden" id="form-register" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="reg-username">Nom d'utilisateur</label>
                <input type="text" id="reg-username" name="username" placeholder="Choisissez un nom (3-30 car.)" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_-]+" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="reg-display">Nom d'affichage</label>
                <input type="text" id="reg-display" name="displayName" placeholder="Votre nom affiché en jeu" maxlength="50">
            </div>
            <div class="form-group">
                <label for="reg-password">Mot de passe</label>
                <input type="password" id="reg-password" name="password" placeholder="Minimum 6 caractères" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="reg-password2">Confirmer le mot de passe</label>
                <input type="password" id="reg-password2" name="password2" placeholder="Retapez votre mot de passe" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="primary-btn" id="register-btn">Créer mon compte</button>
        </form>

        <div class="login-footer">
            MyBridge &mdash; Jouez au Bridge en ligne
        </div>
    </div>
</div>

<script>
    function showTab(tab) {
        document.getElementById('error-msg').classList.remove('visible');
        document.getElementById('success-msg').classList.remove('visible');

        if (tab === 'login') {
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('form-login').classList.remove('hidden');
            document.getElementById('form-register').classList.add('hidden');
        } else {
            document.getElementById('tab-register').classList.add('active');
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('form-register').classList.remove('hidden');
            document.getElementById('form-login').classList.add('hidden');
        }
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.add('visible');
        document.getElementById('success-msg').classList.remove('visible');
    }

    function showSuccess(msg) {
        const el = document.getElementById('success-msg');
        el.textContent = msg;
        el.classList.add('visible');
        document.getElementById('error-msg').classList.remove('visible');
    }

    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const btn = document.getElementById('login-btn');

        btn.disabled = true;
        btn.textContent = 'Connexion...';

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                showSuccess('Connexion réussie ! Redirection...');
                setTimeout(() => { window.location.href = '/'; }, 500);
            } else {
                showError(data.error || 'Erreur de connexion.');
            }
        } catch (err) {
            showError('Erreur réseau. Vérifiez votre connexion.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Se connecter';
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const username = document.getElementById('reg-username').value.trim();
        const displayName = document.getElementById('reg-display').value.trim();
        const password = document.getElementById('reg-password').value;
        const password2 = document.getElementById('reg-password2').value;
        const btn = document.getElementById('register-btn');

        if (password !== password2) {
            showError('Les mots de passe ne correspondent pas.');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Création...';

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, displayName })
            });

            const data = await res.json();

            if (res.ok) {
                showSuccess('Compte créé ! Redirection...');
                setTimeout(() => { window.location.href = '/'; }, 500);
            } else {
                showError(data.error || 'Erreur lors de l\'inscription.');
            }
        } catch (err) {
            showError('Erreur réseau. Vérifiez votre connexion.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Créer mon compte';
        }
    }
</script>
</body>
</html>
